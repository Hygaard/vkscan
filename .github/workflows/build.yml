name: Build Executables

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: VKScan-Windows
            artifact: VKScan.exe
            build_cmd: >-
              pyinstaller --onefile --windowed
              --name "VKScan"
              --icon "vkscan_icon.ico"
              --add-data "vkscan_icon.ico;."
              --add-data "vkscan_icon.png;."
              --hidden-import=tkinter
              --hidden-import=tkinter.ttk
              --hidden-import=tkinter.filedialog
              --hidden-import=tkinter.messagebox
              --hidden-import=tkinter.scrolledtext
              --hidden-import=PIL
              --hidden-import=PIL.Image
              --hidden-import=PIL.ImageTk
              --hidden-import=imagehash
              --hidden-import=send2trash
              vkscan.py
            dist_path: dist/VKScan.exe
          - os: ubuntu-22.04
            name: VKScan-Linux
            artifact: VKScan
            build_cmd: >-
              pyinstaller --onefile
              --name "VKScan"
              --add-data "vkscan_icon.png:."
              --hidden-import=tkinter
              --hidden-import=tkinter.ttk
              --hidden-import=tkinter.filedialog
              --hidden-import=tkinter.messagebox
              --hidden-import=tkinter.scrolledtext
              --hidden-import=PIL
              --hidden-import=PIL.Image
              --hidden-import=PIL.ImageTk
              --hidden-import=imagehash
              --hidden-import=send2trash
              vkscan.py
            dist_path: dist/VKScan
          - os: macos-latest
            name: VKScan-macOS
            artifact: VKScan
            build_cmd: >-
              pyinstaller --onefile --windowed
              --name "VKScan"
              --add-data "vkscan_icon.png:."
              --hidden-import=tkinter
              --hidden-import=tkinter.ttk
              --hidden-import=tkinter.filedialog
              --hidden-import=tkinter.messagebox
              --hidden-import=tkinter.scrolledtext
              --hidden-import=PIL
              --hidden-import=PIL.Image
              --hidden-import=PIL.ImageTk
              --hidden-import=imagehash
              --hidden-import=send2trash
              vkscan.py
            dist_path: dist/VKScan

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: ${{ matrix.build_cmd }}

      - name: Verify build
        run: |
          test -f "${{ matrix.dist_path }}" && echo "Build OK" || (echo "Build FAILED" && exit 1)
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.dist_path }}
          retention-days: 90

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename platform binaries
        run: |
          mv VKScan-Windows/VKScan.exe ./VKScan-Windows.exe
          mv VKScan-Linux/VKScan ./VKScan-Linux-x86_64
          mv VKScan-macOS/VKScan ./VKScan-macOS-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VKScan-Windows.exe
            VKScan-Linux-x86_64
            VKScan-macOS-arm64
          generate_release_notes: true
          draft: false
